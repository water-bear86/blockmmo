# LINT NOTE: This file contains valid GitHub Actions syntax that may trigger false positive warnings
# about "Context access might be invalid: AWS_ROLE_ARN". These warnings can be safely ignored
# as secrets.AWS_ROLE_ARN is the correct and documented way to access GitHub repository secrets.

name: Deploy to ECS Fargate

on:
  push:
    branches: [ main, combat-economy-skins ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      aws_role_arn:
        description: 'AWS Role ARN for deployment'
        required: false
        type: string

env:
  AWS_REGION: ca-west-1
  ECR_REPOSITORY: runechain
  ECS_SERVICE: runechain-service
  ECS_CLUSTER: runechain-cluster
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: runechain

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run verification suite
      run: npm test

    - name: Test health check endpoint
      run: |
        node server.js &
        sleep 5
        curl -f http://localhost:8080/healthz || exit 1
        pkill -f "node server.js"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/combat-economy-skins'
    
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ env.AWS_REGION }}
        # LINT IGNORE: This is a false positive - secrets.AWS_ROLE_ARN is valid GitHub Actions syntax
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

    - name: Verify AWS access
      run: |
        aws sts get-caller-identity
        echo "✅ AWS credentials configured successfully"

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Create ECS service if missing
      run: |
        STATUS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE \
          --query 'services[0].status' --output text 2>/dev/null || echo "NONE")
        if [ "$STATUS" = "ACTIVE" ]; then
          echo "Service already exists — the deploy step will update it."
          exit 0
        fi
        echo "Service not found (status=$STATUS) — creating it (no load balancer, public IP)."
        VPC=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text)
        SUBNETS=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC \
          --query 'Subnets[].SubnetId' --output text | tr '\t' ',')
        SG=$(aws ec2 describe-security-groups --filters Name=group-name,Values=runechain-sg Name=vpc-id,Values=$VPC \
          --query 'SecurityGroups[0].GroupId' --output text)
        TD_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://${{ steps.task-def.outputs.task-definition }} \
          --query 'taskDefinition.taskDefinitionArn' --output text)
        aws ecs create-service \
          --cluster $ECS_CLUSTER --service-name $ECS_SERVICE \
          --task-definition "$TD_ARN" --desired-count 1 --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG],assignPublicIp=ENABLED}"

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Get service URL
      id: service-url
      run: |
        # No load balancer — read the running task's public IP directly.
        TASK=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service-name $ECS_SERVICE \
          --desired-status RUNNING --query 'taskArns[0]' --output text)
        ENI=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks "$TASK" \
          --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value | [0]" --output text)
        IP=$(aws ec2 describe-network-interfaces --network-interface-ids "$ENI" \
          --query 'NetworkInterfaces[0].Association.PublicIp' --output text)
        echo "Task public IP: $IP"
        echo "url=http://$IP:8080" >> $GITHUB_OUTPUT

    - name: Verify deployment
      run: |
        echo "Verifying deployment at ${{ steps.service-url.outputs.url }}"
        sleep 30 # Wait for service to be healthy

        # Try to verify the deployment with retries
        for i in {1..5}; do
          if curl -f ${{ steps.service-url.outputs.url }}/healthz; then
            echo "✅ Deployment verification successful"
            break
          else
            echo "Attempt $i failed, waiting 10 seconds..."
            sleep 10
          fi
        done
